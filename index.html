<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rep. — GYM Tracker</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Geist:wght@400;500;540;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: radial-gradient(ellipse at 30% 20%, #F4EFE6 0%, #E8E0D0 60%, #DCD3BD 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0.6; }
      to   { transform: translateY(0);    opacity: 1;   }
    }
    ::-webkit-scrollbar { width: 0; height: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
